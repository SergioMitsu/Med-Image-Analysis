{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card">
            <div class="card-header">Login</div>
            <div class="card-body">
                <form method="POST">
                    <input type="text" name="username" class="form-control mb-2" placeholder="Usuário" required>
                    <input type="password" name="password" class="form-control mb-2" placeholder="Senha" required>
                    <button class="btn btn-primary w-100">Entrar</button>
                </form>
                <hr>
                <p class="text-center">admin / admin123</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
